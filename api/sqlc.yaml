version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/infrastructure/postgres/schema.sql"
    queries: "internal/infrastructure/postgres/query.sql"
    gen:
      go:
        package: "db"
        out: "internal/infrastructure/postgres/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true

